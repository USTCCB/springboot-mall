server:
  port: 8082
spring:
  application:
    name: springboot-mall
  datasource:
    url: jdbc:h2:mem:mall;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 1000ms
mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.ustccb.mall.entity

# SpringDoc OpenAPI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
