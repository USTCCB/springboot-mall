server:
  port: 8082
spring:
  application:
    name: springboot-mall
  datasource:
    url: jdbc:h2:mem:mall;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.ustccb.mall.entity
